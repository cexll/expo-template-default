name: Feature Request
description: 提出新功能或脚手架能力
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 说明为什么需要这个功能
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 给出你期望的接口或行为
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围与风险
      description: 说明兼容性、迁移或依赖影响
